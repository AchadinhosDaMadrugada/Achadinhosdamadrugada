<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Achadinhos da Madrugada</title>
<style>
body{font-family:Arial, sans-serif;margin:0;background:#0f0f0f;color:#fff}
.header{text-align:center;padding:20px}
.logo{font-size:30px;font-weight:bold;background:linear-gradient(90deg,#00ff88,#00ccff);-webkit-background-clip:text;color:transparent}
.container{max-width:500px;margin:auto}
.card{background:#1c1c1c;margin:15px;padding:15px;border-radius:20px;box-shadow:0 0 15px rgba(0,255,136,0.2)}
img{width:100%;border-radius:15px}
.price{font-size:22px;color:#00ff88}
.old{text-decoration:line-through;color:#888}
.btn{display:block;background:linear-gradient(90deg,#00ff88,#00ccff);color:#000;padding:12px;margin-top:10px;border-radius:10px;text-align:center;text-decoration:none;font-weight:bold}
input,select{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:none}
.checkout{background:#111;padding:15px;border-radius:15px;margin:15px}
.total{font-size:20px;color:#00ff88;margin-top:10px}
.floating{position:fixed;bottom:20px;right:20px;background:#00ff88;color:#000;padding:15px;border-radius:50px;font-weight:bold}
.badge{background:red;padding:5px 10px;border-radius:10px;font-size:12px;display:inline-block;margin-bottom:10px}
</style>
</head>
<body>

<div class="header">
<div class="logo">🔥 Achadinhos da Madrugada</div>
</div>

<div class="container" id="produtos"></div>

<div class="checkout">
<h3>🛒 Carrinho</h3>
<ul id="cart"></ul>

<label>CEP:</label>
<input type="text" id="cep" placeholder="Digite seu CEP">

<label>Frete:</label>
<select id="frete" onchange="calcTotal()">
<option value="0">Frete Grátis</option>
<option value="15">R$ 15 - Normal</option>
<option value="30">R$ 30 - Expresso</option>
</select>

<label>Pagamento:</label>
<select id="pagamento">
<option value="pix">Pix (5% OFF)</option>
<option value="cartao">Cartão</option>
<option value="boleto">Boleto</option>
</select>

<div class="total" id="total">Total: R$ 0</div>

<button class="btn" onclick="finalizar()">FINALIZAR COMPRA</button>
</div>

<div class="floating" onclick="scrollTo(0,0)">⬆️</div>

<script>
const produtos=[
{name:"Controle Gamer",preco:399,img:"https://images.unsplash.com/photo-1606813907291-d86efa9b94db"},
{name:"Fone Bluetooth",preco:89,img:"https://images.unsplash.com/photo-1585386959984-a4155224a1ad"},
{name:"Smartwatch",preco:129,img:"https://images.unsplash.com/photo-1580894908361-967195033215"},
{name:"Caixa de Som",preco:119,img:"https://images.unsplash.com/photo-1598327105666-5b89351aff97"}
];

let carrinho=[];

function renderProdutos(){
let container=document.getElementById('produtos');
produtos.forEach(p=>{
container.innerHTML+=`
<div class="card">
<span class="badge">🔥 VIRAL</span>
<img src="${p.img}">
<h2>${p.nome}</h2>
<div class="price">R$ ${p.preco}</div>
<button class="btn" onclick="addToCart(${p.preco},'${p.nome}')">Adicionar ao Carrinho</button>
</div>`;
});
}

function addToCart(preco,nome){
  carrinho.push({nome,preco});
  renderCart();
}

function renderCart(){
  let cart=document.getElementById('cart');
  cart.innerHTML='';
  carrinho.forEach(item=>{
    let li=document.createElement('li');
    li.innerText=item.nome+' - R$ '+item.preco;
    cart.appendChild(li);
  });
  calcTotal();
}

function calcTotal(){
  let total=0;
  carrinho.forEach(item=>total+=item.preco);
  let frete=parseInt(document.getElementById('frete').value);
  total+=frete;

  if(document.getElementById('pagamento').value==='pix'){
    total=total*0.95;
  }

  document.getElementById('total').innerText='Total: R$ '+Math.round(total);
}

function finalizar(){
  window.location.href="https://shopee.com.br";
}

renderProdutos();
</script>

</body>
</html>
